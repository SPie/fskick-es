services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fskick_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  eventstore_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fskick_eventstore_dev
    ports:
      - "5434:5432"
    volumes:
      - eventstore_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  eventstore_data:
